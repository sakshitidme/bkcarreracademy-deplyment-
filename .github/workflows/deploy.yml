name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create a deployment directory if it doesn't exist
            mkdir -p /var/www/bkcarreracademy
            
            # This is a placeholder script. Adjust paths according to your actual VPS setup.
            # E.g. cd /var/www/bkcarreracademy
            # git pull origin main
            # cd backend && npm ci
            # pm2 restart backend
            
            echo "Deployment step initiated. Make sure to configure RSYNC or GIT PULL on the VPS."
